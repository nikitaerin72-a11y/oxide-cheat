name: Build Kriware
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unzip
        run: unzip -o jni.zip

      - name: Set up NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Build
        run: |
          # Мы принудительно заходим в папку jni, где бы она ни была
          JNI_PATH=$(find . -name "jni" -type d -print -quit)
          if [ -z "$JNI_PATH" ]; then
            echo "ОШИБКА: Папка jni не найдена!"
            exit 1
          fi
          cd "$JNI_PATH"
          ndk-build
          
      - name: Collect and Upload
        if: success()
        run: |
          mkdir -p final_output
          # Ищем все .so файлы в папке libs, которая создается после сборки
          find . -path "*/libs/*.so" -exec cp {} final_output/ \;
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Kriware_Fixed
          path: final_output/
