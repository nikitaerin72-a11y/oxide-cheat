name: Build Kriware
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unzip Project
        run: |
          unzip -o jni.zip
          ls -R

      - name: Set up NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Build with ndk-build
        run: |
          find . -name "Android.mk" -execdir ndk-build \;

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: Kriware_Binaries
          path: "**/libs/**/*"
