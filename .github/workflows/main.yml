name: Build Kriware
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip and Prepare
        run: |
          mkdir jni
          unzip -o jni.zip -d jni/
          echo "--- Проверка папки jni ---"
          ls -F jni/

      - name: Set up NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Build
        run: |
          # Запускаем ndk-build. Он сам найдет папку jni в корне
          ndk-build

      - name: Collect Artifacts
        if: success()
        run: |
          mkdir -p final_output
          # Копируем все найденные .so файлы в папку для загрузки
          find libs/ -name "*.so" -exec cp {} final_output/ \;

      - name: Upload Results
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Kriware_Build
          path: final_output/
